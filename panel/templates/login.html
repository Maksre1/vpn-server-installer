<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .ForceReset}}Смена пароля — VPN Панель{{else}}Вход — VPN Панель{{end}}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .pwd-field { position: relative; }
        .pwd-field input {
            width: 100%;
            padding: 12px 44px 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: transparent;
            caret-color: var(--text);
            font-size: 15px;
            font-family: var(--sans);
            transition: border-color 0.15s;
            outline: none;
            -webkit-text-security: none;
            text-shadow: none;
        }
        .pwd-field input::-webkit-text-security { display: none; }
        .pwd-field input::placeholder { color: var(--text-tertiary); text-shadow: none; }
        .pwd-field input:focus { border-color: var(--border-hover); }
        .pwd-eye {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: none; border: none; border-radius: 8px;
            cursor: pointer; color: var(--text-tertiary);
            transition: background 0.15s, color 0.15s;
        }
        .pwd-eye:hover { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
        .pwd-eye svg { width: 18px; height: 18px; pointer-events: none; }
        .pwd-dots {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; padding-left: 16px;
            pointer-events: none; gap: 5px;
        }
        .pwd-dots span {
            display: inline-block;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: dotPulse 2.5s ease-in-out infinite;
        }
        .pwd-dots span:nth-child(5n+1) { width: 9px; height: 9px; opacity: 0.6; animation-delay: 0s; }
        .pwd-dots span:nth-child(5n+2) { width: 7px; height: 7px; opacity: 0.35; animation-delay: 0.4s; }
        .pwd-dots span:nth-child(5n+3) { width: 10px; height: 10px; opacity: 0.55; animation-delay: 0.8s; }
        .pwd-dots span:nth-child(5n+4) { width: 6px; height: 6px; opacity: 0.3; animation-delay: 0.2s; }
        .pwd-dots span:nth-child(5n+5) { width: 8px; height: 8px; opacity: 0.5; animation-delay: 0.6s; }
        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: inherit; }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 17C10.9 17 10 16.1 10 15C10 13.9 10.9 13 12 13C13.1 13 14 13.9 14 15C14 16.1 13.1 17 12 17ZM13 11H11V7H13V11Z" fill="#10b981"/>
                </svg>
                {{if .ForceReset}}
                <h2>Смена пароля</h2>
                <p style="color: var(--text-muted); font-size: 14px; margin-top: 8px;">Для продолжения необходимо сменить стандартный пароль.</p>
                {{else}}
                <h2>Вход в панель</h2>
                <p style="color: var(--text-muted); font-size: 14px; margin-top: 8px;">Введите учетные данные</p>
                {{end}}
            </div>

            {{if .Error}}
            <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--danger); padding: 12px; border-radius: 12px; font-size: 14px; margin-bottom: 20px; text-align: center;">
                {{.Error}}
            </div>
            {{end}}

            <form action="{{if .ForceReset}}/reset-password{{else}}/login{{end}}" method="POST">
                {{if .ForceReset}}
                <div class="form-group">
                    <label class="form-label">Новый пароль</label>
                    <div class="pwd-field">
                        <input type="password" id="new_password" name="new_password" required minlength="8" placeholder="Минимум 8 символов" oninput="renderDots('new_password', 'dots-new')">
                        <div class="pwd-dots" id="dots-new"></div>
                        <button type="button" class="pwd-eye" onclick="togglePwd('new_password', 'dots-new', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Подтверждение пароля</label>
                    <div class="pwd-field">
                        <input type="password" id="confirm_password" name="confirm_password" required minlength="8" placeholder="Повторите пароль" oninput="renderDots('confirm_password', 'dots-confirm')">
                        <div class="pwd-dots" id="dots-confirm"></div>
                        <button type="button" class="pwd-eye" onclick="togglePwd('confirm_password', 'dots-confirm', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Сохранить и продолжить</button>
                {{else}}
                <div class="form-group">
                    <label class="form-label" for="username">Имя пользователя</label>
                    <input class="form-input" type="text" id="username" name="username" required value="admin">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <div class="pwd-field">
                        <input type="password" id="password" name="password" required placeholder="Введите пароль" oninput="renderDots('password', 'dots-login')">
                        <div class="pwd-dots" id="dots-login"></div>
                        <button type="button" class="pwd-eye" onclick="togglePwd('password', 'dots-login', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Войти</button>
                {{end}}
            </form>
        </div>
    </div>
    <script>
        function renderDots(inputId, dotsId) {
            const input = document.getElementById(inputId);
            const dots = document.getElementById(dotsId);
            const len = input.value.length;
            let html = '';
            for (let i = 0; i < len; i++) {
                html += '<span></span>';
            }
            dots.innerHTML = html;
        }

        function togglePwd(inputId, dotsId, btn) {
            const input = document.getElementById(inputId);
            const dots = document.getElementById(dotsId);
            if (input.style.color === 'transparent') {
                input.style.color = 'var(--text)';
                input.style.webkitTextSecurity = 'none';
                dots.style.display = 'none';
            } else {
                input.style.color = 'transparent';
                dots.style.display = 'flex';
                renderDots(inputId, dotsId);
            }
        }

        // Init dots on load
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.pwd-field input[type="password"]').forEach(function(input) {
                if (input.value.length > 0) {
                    const dotsId = input.getAttribute('oninput').match(/'([^']+)'/)[2];
                    renderDots(input.id, dotsId);
                }
            });
        });
    </script>
</body>
</html>
